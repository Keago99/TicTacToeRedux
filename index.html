<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <header>
        <h1>Tic Tac Toe!</h1>
    </header>
    <main>
        <div id="mainArea">
            <div class="playerArea">
                <div class="playerName" id="player1Name">
                    Player 1!
                </div>
            </div>
            <div id="mainGrid">
                <div class="gridItem"></div>
                <div class="gridItem"></div>
                <div class="gridItem"></div>
                <div class="gridItem"></div>
                <div class="gridItem"></div>
                <div class="gridItem"></div>
                <div class="gridItem"></div>
                <div class="gridItem"></div>
                <div class="gridItem"></div>
            </div>
            <div class="playerArea">
                <div class="playerName" id="player2Name">
                    Player 2!
                </div>
            </div>
        </div>
  
        <div id="mainDialog">
            <dialog>
                <label for="player1Name">Player 1:</label>
                <input type="text" id="player1Name">
                
                <label for="player2Name">Player2:</label>
                <input type="text" id="player2Name">
            </dialog>
        </div>
    </main>
    <footer></footer>
</body>
</html>
